[package]
name = "yurt-kernel-wasm"
version = "0.0.0"
edition = "2021"
publish = false
description = "Yurt kernel compiled to wasm32-wasip1; runs inside any microkernel host."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Tar parsing for image-layer mounts. Pure Rust; works on
# wasm32-wasip1 without features.
tar = { version = "0.4", default-features = false }

[build-dependencies]
toml = "0.8"

[features]
default = []
