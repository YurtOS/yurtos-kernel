[return.scalar_errno]
doc = "Non-negative scalar success value, or negative POSIX errno on failure."

[return.fixed_out]
doc = "Writes a fixed-size output struct and returns bytes written. If out_cap is too small, returns the required size and does not write a partial struct."

[return.record_out]
doc = "Writes a variable-size native record and returns bytes written. If out_cap is too small, returns the required size and does not write a partial record."

[return.stream_io]
doc = "POSIX stream transfer. Returns bytes actually read or written, 0 for EOF on reads, or negative POSIX errno. Partial success is allowed."

[struct.yurt_abi_record_header]
doc = "Header at the front of every variable-size native request or response record."
fields = [
  { name = "size", type = "u32", doc = "Logical initialized record size in bytes." },
  { name = "version", type = "u16", doc = "Record version." },
  { name = "flags", type = "u16", doc = "Record-specific flags." },
]

[struct.yurt_wait_result_v1]
doc = "Fixed output written by host_wait."
fields = [
  { name = "pid", type = "i32", doc = "Child pid that changed state." },
  { name = "exit_code", type = "i32", doc = "Exit code when exited normally, otherwise 0." },
  { name = "signal", type = "i32", doc = "Signal number when signaled, otherwise 0." },
  { name = "flags", type = "i32", doc = "Wait result flags." },
]

[struct.yurt_pipe_result_v1]
doc = "Fixed output written by host_pipe."
fields = [
  { name = "read_fd", type = "i32", doc = "Read end file descriptor." },
  { name = "write_fd", type = "i32", doc = "Write end file descriptor." },
]

[struct.yurt_spawn_result_v1]
doc = "Fixed output written by host_spawn."
fields = [
  { name = "pid", type = "i32", doc = "Spawned process id." },
]

[struct.yurt_socket_addr_result_v1]
doc = "Fixed IPv4 socket address result."
fields = [
  { name = "host_be", type = "u32", doc = "IPv4 address in network byte order." },
  { name = "port_be", type = "u16", doc = "Port in network byte order." },
  { name = "reserved", type = "u16", doc = "Reserved; must be zero." },
]

[struct.yurt_socket_accept_result_v1]
doc = "Fixed accept result."
fields = [
  { name = "fd", type = "i32", doc = "Accepted socket fd." },
  { name = "peer_host_be", type = "u32", doc = "Peer IPv4 address in network byte order." },
  { name = "peer_port_be", type = "u16", doc = "Peer port in network byte order." },
  { name = "local_port_be", type = "u16", doc = "Local port in network byte order." },
  { name = "local_host_be", type = "u32", doc = "Local IPv4 address in network byte order." },
]

[struct.yurt_dns_addr_result_v1]
doc = "Native DNS IPv4 address result."
fields = [
  { name = "family", type = "u32", doc = "Address family, currently YURT_AF_INET." },
  { name = "addr_be", type = "u32", doc = "IPv4 address in network byte order." },
]

[struct.yurt_record_span_v1]
doc = "Offset and length pair inside a variable native record."
fields = [
  { name = "offset", type = "u32", doc = "Byte offset from the start of the record." },
  { name = "length", type = "u32", doc = "Byte length." },
]

[struct.yurt_record_pair_v1]
doc = "Two string spans used for key/value vectors."
fields = [
  { name = "key_offset", type = "u32", doc = "Key byte offset from the start of the record." },
  { name = "key_length", type = "u32", doc = "Key byte length." },
  { name = "value_offset", type = "u32", doc = "Value byte offset from the start of the record." },
  { name = "value_length", type = "u32", doc = "Value byte length." },
]

[struct.yurt_fetch_request_v1]
doc = "Variable native fetch request record header."
fields = [
  { name = "size", type = "u32", doc = "Total logical record size." },
  { name = "version", type = "u16", doc = "Record version." },
  { name = "flags", type = "u16", doc = "Reserved flags." },
  { name = "url_offset", type = "u32", doc = "URL byte offset." },
  { name = "url_length", type = "u32", doc = "URL byte length." },
  { name = "method_offset", type = "u32", doc = "HTTP method byte offset." },
  { name = "method_length", type = "u32", doc = "HTTP method byte length." },
  { name = "headers_offset", type = "u32", doc = "Offset of yurt_record_pair_v1 header entries." },
  { name = "headers_count", type = "u32", doc = "Number of header entries." },
  { name = "body_offset", type = "u32", doc = "Request body byte offset, or zero for none." },
  { name = "body_length", type = "u32", doc = "Request body byte length." },
  { name = "redirect_mode", type = "u32", doc = "YURT_FETCH_REDIRECT_* value." },
]

[struct.yurt_fetch_response_v1]
doc = "Variable native fetch response record header."
fields = [
  { name = "size", type = "u32", doc = "Total logical record size." },
  { name = "version", type = "u16", doc = "Record version." },
  { name = "flags", type = "u16", doc = "Reserved flags." },
  { name = "status", type = "u32", doc = "HTTP response status, or zero for transport error." },
  { name = "headers_offset", type = "u32", doc = "Offset of yurt_record_pair_v1 response header entries." },
  { name = "headers_count", type = "u32", doc = "Number of response header entries." },
  { name = "body_offset", type = "u32", doc = "Response body byte offset." },
  { name = "body_length", type = "u32", doc = "Response body byte length." },
  { name = "error_offset", type = "u32", doc = "Error string byte offset, or zero for no error." },
  { name = "error_length", type = "u32", doc = "Error string byte length." },
]

[struct.yurt_extension_request_v1]
doc = "Variable native extension invocation request record header."
fields = [
  { name = "size", type = "u32", doc = "Total logical record size." },
  { name = "version", type = "u16", doc = "Record version." },
  { name = "flags", type = "u16", doc = "Reserved flags." },
  { name = "name_offset", type = "u32", doc = "Extension name byte offset." },
  { name = "name_length", type = "u32", doc = "Extension name byte length." },
  { name = "argv_offset", type = "u32", doc = "Offset of yurt_record_span_v1 argv entries." },
  { name = "argv_count", type = "u32", doc = "Number of argv entries." },
  { name = "stdin_offset", type = "u32", doc = "Stdin byte offset." },
  { name = "stdin_length", type = "u32", doc = "Stdin byte length." },
  { name = "cwd_offset", type = "u32", doc = "Current directory byte offset." },
  { name = "cwd_length", type = "u32", doc = "Current directory byte length." },
  { name = "env_offset", type = "u32", doc = "Offset of yurt_record_pair_v1 environment entries." },
  { name = "env_count", type = "u32", doc = "Number of environment entries." },
  { name = "payload_offset", type = "u32", doc = "Opaque plugin payload byte offset." },
  { name = "payload_length", type = "u32", doc = "Opaque plugin payload byte length." },
]

[struct.yurt_extension_response_v1]
doc = "Variable native extension invocation response record header."
fields = [
  { name = "size", type = "u32", doc = "Total logical record size." },
  { name = "version", type = "u16", doc = "Record version." },
  { name = "flags", type = "u16", doc = "Reserved flags." },
  { name = "exit_code", type = "i32", doc = "Extension process-style exit code." },
  { name = "stdout_offset", type = "u32", doc = "Stdout byte offset." },
  { name = "stdout_length", type = "u32", doc = "Stdout byte length." },
  { name = "stderr_offset", type = "u32", doc = "Stderr byte offset." },
  { name = "stderr_length", type = "u32", doc = "Stderr byte length." },
  { name = "payload_offset", type = "u32", doc = "Opaque plugin response byte offset." },
  { name = "payload_length", type = "u32", doc = "Opaque plugin response byte length." },
]

[struct.yurt_process_entry_v1]
doc = "Fixed entry in a native process-list response."
fields = [
  { name = "pid", type = "i32", doc = "Process id." },
  { name = "ppid", type = "i32", doc = "Parent process id." },
  { name = "state", type = "u32", doc = "Kernel process state enum value." },
  { name = "command_offset", type = "u32", doc = "Command string byte offset." },
  { name = "command_length", type = "u32", doc = "Command string byte length." },
]

[struct.yurt_process_list_response_v1]
doc = "Variable native process-list response record header."
fields = [
  { name = "size", type = "u32", doc = "Total logical record size." },
  { name = "version", type = "u16", doc = "Record version." },
  { name = "flags", type = "u16", doc = "Reserved flags." },
  { name = "entries_offset", type = "u32", doc = "Offset of yurt_process_entry_v1 entries." },
  { name = "entries_count", type = "u32", doc = "Number of process entries." },
]

[import.host_pipe]
doc = "Create an anonymous pipe and write yurt_pipe_result_v1."
return = "fixed_out"
args = [
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_dup]
doc = "Duplicate a file descriptor and write the new fd as a fixed i32 output."
return = "fixed_out"
args = [
  { name = "fd", type = "fd" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_dup_min]
doc = "Duplicate a file descriptor into the lowest free fd >= min_fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "min_fd", type = "i32" },
]

[import.host_set_fd_descriptor_flags]
doc = "Set POSIX descriptor flags such as FD_CLOEXEC for an open fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "flags", type = "i32" },
]

[import.host_tcgetpgrp]
doc = "Return the foreground process group for the terminal on fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
]

[import.host_tcsetpgrp]
doc = "Set the foreground process group for the terminal on fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "pgid", type = "i32" },
]

[import.host_tcgetattr]
doc = "Write the minimal musl wasm32 termios record for a terminal fd."
return = "fixed_out"
args = [
  { name = "fd", type = "fd" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_tcsetattr]
doc = "Accept terminal attribute changes for a terminal fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "actions", type = "i32" },
  { name = "termios_ptr", type = "ptr" },
]

[import.host_winsize]
doc = "Write struct winsize { rows, cols, xpixel, ypixel } for a terminal fd."
return = "fixed_out"
args = [
  { name = "fd", type = "fd" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_tiocsctty]
doc = "Register fd as the caller's controlling terminal."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
]

[import.host_chown]
doc = "Change sandbox-visible path ownership metadata."
return = "scalar_errno"
args = [
  { name = "path_ptr", type = "ptr" },
  { name = "path_len", type = "usize" },
  { name = "uid", type = "uid" },
  { name = "gid", type = "gid" },
]

[import.host_fchown]
doc = "Change sandbox-visible ownership metadata for an open file descriptor."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "uid", type = "uid" },
  { name = "gid", type = "gid" },
]

[import.host_sched_getaffinity]
doc = "Write the process CPU affinity mask. Yurt currently exposes a single CPU, bit 0."
return = "fixed_out"
args = [
  { name = "pid", type = "pid" },
  { name = "mask_ptr", type = "ptr" },
  { name = "cpusetsize", type = "usize" },
]

[import.host_sched_setaffinity]
doc = "Validate the process CPU affinity mask. Yurt currently accepts only CPU 0."
return = "scalar_errno"
args = [
  { name = "pid", type = "pid" },
  { name = "mask_ptr", type = "ptr" },
  { name = "cpusetsize", type = "usize" },
]

[import.host_spawn]
doc = "Spawn a guest process from a native spawn request record and write yurt_spawn_result_v1."
return = "fixed_out"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_wait]
doc = "Wait for a child process. pid -1 means any child; flags may include YURT_WAIT_NOHANG."
return = "fixed_out"
args = [
  { name = "pid", type = "pid" },
  { name = "flags", type = "u32" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_read_fd]
doc = "Read up to out_cap bytes from fd into guest memory. Partial success is allowed."
return = "stream_io"
args = [
  { name = "fd", type = "fd" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_write_fd]
doc = "Write up to data_len bytes from guest memory to fd. Partial success is allowed."
return = "stream_io"
args = [
  { name = "fd", type = "fd" },
  { name = "data_ptr", type = "ptr" },
  { name = "data_len", type = "usize" },
]

[import.host_socket_send]
doc = "Send bytes on a socket. Partial success is allowed."
return = "stream_io"
args = [
  { name = "fd", type = "fd" },
  { name = "data_ptr", type = "ptr" },
  { name = "data_len", type = "usize" },
  { name = "flags", type = "i32" },
]

[import.host_socket_recv]
doc = "Receive bytes from a socket. Partial success is allowed."
return = "stream_io"
args = [
  { name = "fd", type = "fd" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
  { name = "flags", type = "i32" },
]

[import.host_socket_connect]
doc = "Connect a socket fd to a POSIX sockaddr record. Flags may include YURT_SOCKET_FLAG_TLS."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "addr_ptr", type = "ptr" },
  { name = "addr_len", type = "usize" },
  { name = "flags", type = "u32" },
]

[import.host_socket_bind]
doc = "Bind a socket fd to a POSIX sockaddr record."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "addr_ptr", type = "ptr" },
  { name = "addr_len", type = "usize" },
]

[import.host_socket_listen]
doc = "Listen on a bound socket fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "backlog", type = "i32" },
]

[import.host_socket_accept]
doc = "Accept a connection and write yurt_socket_accept_result_v1."
return = "fixed_out"
args = [
  { name = "fd", type = "fd" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_socket_addr]
doc = "Write yurt_socket_addr_result_v1 for local or peer address."
return = "fixed_out"
args = [
  { name = "fd", type = "fd" },
  { name = "which", type = "u32" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_socket_option]
doc = "Set or get a scalar socket option. Get returns the option value as a non-negative scalar."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
  { name = "option", type = "u32" },
  { name = "has_value", type = "u32" },
  { name = "value", type = "i32" },
]

[import.host_socket_close]
doc = "Close a socket fd."
return = "scalar_errno"
args = [
  { name = "fd", type = "fd" },
]

[import.host_dns_resolve]
doc = "Resolve a UTF-8 host name and write a native address record."
return = "record_out"
args = [
  { name = "host_ptr", type = "ptr" },
  { name = "host_len", type = "usize" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_network_fetch]
doc = "Execute a network fetch described by a native request record and write a native response record."
return = "record_out"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_extension_invoke]
doc = "Invoke a registered host extension through a native extension request record and write a native extension response record."
return = "record_out"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_socket_set_no_delay]
doc = "Set or clear TCP_NODELAY on a connected socket fd. Returns 0 or negated errno."
return = "stream_io"
args = [
  { name = "fd", type = "fd" },
  { name = "enabled", type = "i32" },
]

[import.host_idb_get]
doc = "Read a durable KV entry. Request is u8 store_len + store + key bytes. Writes value bytes into (out_ptr, out_cap)."
return = "record_out"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[import.host_idb_put]
doc = "Write a durable KV entry. Request is u8 store_len + store + u32 key_len LE + key + value."
return = "stream_io"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
]

[import.host_idb_delete]
doc = "Remove a durable KV entry. Request is u8 store_len + store + key bytes."
return = "stream_io"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
]

[import.host_idb_list]
doc = "List keys in a store. Request is u8 store_len + store + prefix bytes (empty = all). Writes count + (len, bytes)*."
return = "record_out"
args = [
  { name = "req_ptr", type = "ptr" },
  { name = "req_len", type = "usize" },
  { name = "out_ptr", type = "ptr" },
  { name = "out_cap", type = "usize" },
]

[function.yurt_system]
doc = "Compatibility helper implemented over spawn, pipes, fd I/O, and wait. Not a host import."
return = "int"
args = [
  { name = "cmd", type = "const char *" },
]

[function.yurt_popen]
doc = "Compatibility helper implemented over spawn, pipes, fd I/O, and wait. Not a host import."
return = "FILE *"
args = [
  { name = "cmd", type = "const char *" },
  { name = "mode", type = "const char *" },
]

[function.yurt_pclose]
doc = "Close a stream returned by yurt_popen and return command status."
return = "int"
args = [
  { name = "stream", type = "FILE *" },
]
