# Method-id assignments for the user→kernel trampoline.
#
# This file is the *authoritative* mapping between the user-facing
# syscall names declared in `yurt_abi.toml` (and the kernel-internal
# methods exposed by `kernel.wasm`) and the stable u32 method IDs the
# microkernel passes to `kernel_dispatch`.
#
# Rules:
#   - IDs are stable. Never reuse, never renumber. New entries append.
#   - 0 is reserved for negotiation / health.
#   - 1..=0xFFFF is the kernel-internal range (echo, now_realtime, …).
#     These methods are not part of `yurt_abi.toml`; they exist only so
#     the microkernel can validate trampoline plumbing without a real
#     syscall.
#   - 0x1_0000+ is the yurt_abi.toml syscall range. One entry per
#     `[import.<name>]` in `yurt_abi.toml` — this file lags slightly as
#     syscalls move from the TS kernel into kernel.wasm.
#
# Consumed by `packages/kernel-wasm/build.rs` to emit Rust constants
# (`METHOD_<UPPERCASE_NAME>: u32`).

[constant.YURT_KERNEL_DISPATCH_NEGOTIATION]
type = "u32"
value = 0
doc = "Reserved method id for protocol negotiation / health checks."

# Kernel-internal methods (1..=0xFFFF range).
[method.kernel_echo]
id = 1
kind = "internal"
doc = "Round-trip request bytes into the response buffer; validates memory-mediated trampoline."

[method.kernel_now_realtime]
id = 2
kind = "internal"
doc = "Round-trip a kh_now_realtime call into the response buffer; validates kernel→host direction."

[method.kernel_log_test]
id = 3
kind = "internal"
doc = "Emit a fixed log line via kh_log at INFO severity; validates the host log sink wiring."

# Syscall methods (0x1_0000+ range).
#
# These are the real user-process-facing syscalls — `sys_*` names match
# the architectural reality (the call lands inside kernel.wasm). The
# legacy wasm import symbols in `yurt_abi.toml` are still `host_*` for
# binary compatibility with already-built userland (BusyBox, zsh, …);
# the microkernel maps each legacy `host_*` import to its `sys_*`
# method id when forwarding the trampoline call. A future sweep will
# rename the wasm symbols and recompile userland.
#
# Methods land here as they get ported from the TS kernel into
# kernel.wasm.

[method.sys_getuid]
id = 0x1_0001
kind = "syscall"
doc = "Real user id of the calling process."

[method.sys_geteuid]
id = 0x1_0002
kind = "syscall"
doc = "Effective user id of the calling process."

[method.sys_getgid]
id = 0x1_0003
kind = "syscall"
doc = "Real group id of the calling process."

[method.sys_getegid]
id = 0x1_0004
kind = "syscall"
doc = "Effective group id of the calling process."

[method.sys_getpid]
id = 0x1_0005
kind = "syscall"
doc = "Pid of the calling process. Threaded through kernel_dispatch via caller_pid."

[method.sys_getppid]
id = 0x1_0006
kind = "syscall"
doc = "Parent pid of the calling process. Returns 0 (kernel pid) until the spawn syscall lands and the kernel tracks parent/child relationships."

[method.sys_umask]
id = 0x1_0007
kind = "syscall"
doc = "Set the file-mode-creation mask for the calling process; returns the previous value. Request bytes carry the new mask as a little-endian u32 (only the low 9 bits are meaningful)."

[method.sys_setresuid]
id = 0x1_0008
kind = "syscall"
doc = "Set the calling process's real, effective, and saved uid. Request bytes carry three little-endian u32s: ruid, euid, suid. Phase 2 has no permission checks; security policy comes later. Returns 0 or negated POSIX errno."

[method.sys_setresgid]
id = 0x1_0009
kind = "syscall"
doc = "Set the calling process's real, effective, and saved gid. Request bytes carry three little-endian u32s: rgid, egid, sgid. Returns 0 or negated POSIX errno."

[method.sys_chdir]
id = 0x1_000A
kind = "syscall"
doc = "Change the calling process's working directory. Request bytes carry the path. Phase 2 has no VFS validation — the path is stored verbatim. Returns 0 or negated POSIX errno."

[method.sys_getcwd]
id = 0x1_000B
kind = "syscall"
doc = "Write the calling process's working directory (NUL-terminated) into the response buffer. Returns required size (path length + 1) on success — caller checks against out_cap to detect a too-small buffer (matches the TS host_getcwd convention)."

[method.sys_getrlimit]
id = 0x1_000C
kind = "syscall"
doc = "Read a POSIX resource limit. Request bytes carry the u32 resource id; response is 16 bytes — soft (le u64) followed by hard (le u64). u64::MAX = RLIM_INFINITY. Returns 16 on success, -EINVAL for unsupported resource ids."

[method.sys_setrlimit]
id = 0x1_000D
kind = "syscall"
doc = "Set a POSIX resource limit. Request bytes carry u32 resource id + le u64 soft + le u64 hard (20 bytes). Returns 0 on success, -EINVAL for unsupported resources, -EPERM if the new limit exceeds the existing hard limit (POSIX rule)."

[method.sys_close]
id = 0x1_000E
kind = "syscall"
doc = "Close an open file descriptor. Request bytes carry the u32 fd. Returns 0 on success, -EBADF if the fd is not open."

[method.sys_dup]
id = 0x1_000F
kind = "syscall"
doc = "Duplicate an fd to the lowest unused number. Request bytes carry the u32 oldfd. Returns the new fd (non-negative) on success, -EBADF if oldfd is not open."

[method.sys_dup2]
id = 0x1_0011
kind = "syscall"
doc = "Duplicate oldfd to exactly newfd, silently closing newfd first if it was open. Request bytes carry two u32s: oldfd, newfd. Returns newfd on success, -EBADF if oldfd is not open."

[method.sys_pipe]
id = 0x1_0012
kind = "syscall"
doc = "Create an anonymous pipe. No request. Response is 8 bytes: read_fd (u32 LE) followed by write_fd (u32 LE). Both fds reference the same kernel-side PipeBuf. Returns 8 on success."

[method.sys_read]
id = 0x1_0013
kind = "syscall"
doc = "Read up to response capacity bytes from fd. Request bytes carry the u32 fd. Returns bytes-read on success, 0 for EOF (writers all closed), -EAGAIN if no data and writers still attached, -EBADF for bad fd, -EINVAL for non-readable fd type."

[method.sys_write]
id = 0x1_0014
kind = "syscall"
doc = "Write payload bytes to fd. Request bytes are: u32 fd LE + payload. Returns bytes-written on success, -EPIPE if all readers have closed (pipes), -EBADF for bad fd, -EINVAL for non-writable fd type. Stdout/stderr writes are routed through kh_log."

[method.sys_extension_invoke]
id = 0x1_0010
kind = "syscall"
doc = "Forward an opaque request to the microkernel-side extension registry. The kernel acts as a byte courier; wire format is the registry's concern."
