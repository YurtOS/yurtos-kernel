name: Guest Compat Fixtures

on:
  pull_request:
  push:
    branches:
      - main
      - codex/posix-libc-runtime
  workflow_dispatch:

jobs:
  build-fixtures:
    name: Build generated fixtures and run kernel smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-wasip1
          components: rust-src

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install Binaryen
        run: |
          set -euxo pipefail
          BINARYEN_VER=119
          curl -sSL -o /tmp/binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VER}/binaryen-version_${BINARYEN_VER}-x86_64-linux.tar.gz"
          mkdir -p "$HOME/.binaryen"
          tar -xzf /tmp/binaryen.tar.gz -C "$HOME/.binaryen" --strip-components=1
          echo "$HOME/.binaryen/bin" >> "$GITHUB_PATH"

      - name: Install WASI SDK
        run: |
          set -euxo pipefail
          WASI_SDK_VER=30.0
          curl -sSL -o /tmp/wasi-sdk.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VER%%.*}/wasi-sdk-${WASI_SDK_VER}-x86_64-linux.tar.gz"
          mkdir -p "$HOME/.local/share"
          tar -xzf /tmp/wasi-sdk.tar.gz -C "$HOME/.local/share"
          mv "$HOME/.local/share"/wasi-sdk-${WASI_SDK_VER}* "$HOME/.local/share/wasi-sdk"
          echo "WASI_SDK_PATH=$HOME/.local/share/wasi-sdk" >> "$GITHUB_ENV"

      - name: Build Yurt toolchain
        run: cargo build --release -p yurt-toolchain

      - name: Build guest compat canaries
        run: make -C abi all copy-fixtures

      - name: Build Yurt Rust std
        run: |
          set -euxo pipefail
          RUST_VERSION="$(rustc --version | awk '{print $2}')"
          scripts/build-rust-std.sh --rust "$RUST_VERSION"

      - name: Build zstd-sys through cargo-yurt
        env:
          CC_wasm32_wasip1: ${{ github.workspace }}/target/release/yurt-cc
          AR_wasm32_wasip1: ${{ github.workspace }}/target/release/yurt-ar
          RANLIB_wasm32_wasip1: ${{ github.workspace }}/target/release/yurt-ranlib
          YURT_CC_ARCHIVE: ${{ github.workspace }}/abi/build/libyurt_abi.a
        run: env -u YURT_CC_INCLUDE target/release/cargo-yurt build --release -p zstd-sys-smoke

      - name: Build Rust std canaries
        run: make -C abi rust-canaries rust-std-canaries

      - name: Build shell runner fixture
        run: |
          set -euxo pipefail
          cargo build --release --target wasm32-wasip1 -p yurt-shell-exec
          cp target/wasm32-wasip1/release/yurt-shell-exec.wasm \
            packages/kernel/src/platform/__tests__/fixtures/yurt-shell-exec.wasm
          cp target/wasm32-wasip1/release/yurt-shell-exec.wasm \
            packages/kernel/src/platform/__tests__/fixtures/yurt-shell-exec-asyncify.wasm
          wasm-opt --asyncify -O2 \
            --enable-bulk-memory \
            --enable-sign-ext \
            --enable-nontrapping-float-to-int \
            packages/kernel/src/platform/__tests__/fixtures/yurt-shell-exec-asyncify.wasm \
            -o packages/kernel/src/platform/__tests__/fixtures/yurt-shell-exec-asyncify.wasm

      # ── C-port fixture caching (per #209) ───────────────────────────────
      # Each port's .wasm output is deterministic given its source tree
      # plus the ABI headers, ABI sources, yurt-cc toolchain, and the
      # workflow's WASI SDK pin. Cache the produced fixture(s) keyed on
      # those inputs; skip the slow `make copy-fixtures` invocation on
      # hit. Building all three (busybox + ncurses + zsh) costs ~6 min
      # of CI time.
      - name: Cache BusyBox fixture
        id: busybox-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/kernel/src/platform/__tests__/fixtures/busybox.wasm
            packages/kernel/src/platform/__tests__/fixtures/busybox.manifest.json
          key: fixture-busybox-${{ hashFiles('test-fixtures/c-ports/busybox/**', 'abi/include/**', 'abi/src/**', 'abi/Makefile', 'abi/toolchain/**', 'Cargo.lock', '.github/workflows/guest-compat.yml') }}

      - name: Build BusyBox fixture
        if: steps.busybox-cache.outputs.cache-hit != 'true'
        run: make -C test-fixtures/c-ports/busybox copy-fixtures

      - name: Cache yurt-packages downloads
        uses: actions/cache@v4
        with:
          path: test-fixtures/.pkg-cache
          key: yurt-packages-busybox-1.37.0-pkg-0.1.0

      - name: Build standard image from pre-built packages
        run: deno run -A scripts/build-standard-image.ts

      # ncurses cache covers both the fixture wasm AND the build/install
      # tree — zsh's compile step needs the latter when zsh's own fixture
      # cache misses but ncurses's hits.
      - name: Cache ncurses fixture + install tree
        id: ncurses-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/kernel/src/platform/__tests__/fixtures/terminfo-canary.wasm
            test-fixtures/c-ports/ncurses/build/install
          key: fixture-ncurses-${{ hashFiles('test-fixtures/c-ports/ncurses/**', 'abi/include/**', 'abi/src/**', 'abi/Makefile', 'abi/toolchain/**', 'Cargo.lock', '.github/workflows/guest-compat.yml') }}

      - name: Build ncurses fixture
        if: steps.ncurses-cache.outputs.cache-hit != 'true'
        run: make -C test-fixtures/c-ports/ncurses copy-fixtures

      # zsh's cache key folds in ncurses sources too: if ncurses inputs
      # change, zsh.wasm content can change too, so both must invalidate
      # together.
      - name: Cache zsh fixture
        id: zsh-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/kernel/src/platform/__tests__/fixtures/zsh.wasm
          key: fixture-zsh-${{ hashFiles('test-fixtures/c-ports/zsh/**', 'test-fixtures/c-ports/ncurses/**', 'abi/include/**', 'abi/src/**', 'abi/Makefile', 'abi/toolchain/**', 'Cargo.lock', '.github/workflows/guest-compat.yml') }}

      - name: Build zsh fixture
        if: steps.zsh-cache.outputs.cache-hit != 'true'
        run: make -C test-fixtures/c-ports/zsh copy-fixtures

      - name: Run fixture smoke tests
        run: deno test --no-check --allow-read --allow-write --allow-env --allow-net packages/kernel/src/__tests__/fixture-build-smoke_test.ts packages/kernel/src/process/__tests__/module-cache_test.ts

      - name: Run upstream zsh tests
        # Slowest test in the repo (~3 min). Per #209, skip on PR to keep
        # the pre-merge gate fast; still runs on push-to-main so any
        # regression surfaces immediately after merge. Run manually
        # against a PR with `gh workflow run "Guest Compat Fixtures"
        # --ref <branch>` if the change touches zsh / port toolchain.
        if: ${{ github.event_name != 'pull_request' }}
        run: deno test --no-check --allow-read --allow-write --allow-env --allow-net packages/kernel/src/__tests__/zsh-upstream_slow.ts

      - name: Run Rust kernel process/fd smoke tests
        if: ${{ vars.YURT_ENABLE_WASM_KERNEL_CI == '1' }}
        run: |
          set -euxo pipefail
          cargo test -p yurt-kernel-wasm --lib
          cargo test -p yurt-runtime-wasmtime --test kernel_wasm_trampoline run_pending_spawns_preserves_spawned_child_fd_inheritance

      - name: Parity gate — TS vs Rust kernel over the conformance corpus (slice B0)
        if: ${{ vars.YURT_ENABLE_WASM_KERNEL_CI == '1' }}
        run: |
          set -euxo pipefail
          # Canaries + fixtures already built by "Build guest compat canaries"
          # (make -C abi all copy-fixtures). The differ also needs kernel.wasm.
          cargo build --release -p yurt-kernel-wasm --target wasm32-wasip1
          YURT_KERNEL=both deno test --no-check \
            --allow-read --allow-env --allow-run \
            packages/kernel/src/__tests__/parity-differ_test.ts

      - name: Run guest compatibility tests
        run: deno test --no-check --allow-read --allow-env --allow-run packages/kernel/src/__tests__/abi_test.ts

      - name: Run VFS overlay tests
        run: deno test --no-check --allow-read --allow-write --allow-env packages/kernel/src/vfs/__tests__/overlay-vfs_test.ts packages/kernel/src/vfs/__tests__/root-provider_test.ts packages/kernel/src/__tests__/sandbox-base-root_test.ts

      - name: Run adversarial security tests
        run: deno test --no-check --allow-read --allow-write --allow-env --allow-net packages/kernel/src/__tests__/security-adversarial_test.ts

      - name: Run kernel unit tests
        run: deno test --no-check --allow-read --allow-env packages/kernel/src/wasi/__tests__/errors_test.ts packages/kernel/src/network/__tests__/host-match_test.ts packages/kernel/src/network/__tests__/gateway_test.ts packages/kernel/src/network/__tests__/gateway-sensitive-headers_test.ts packages/kernel/src/process/threads/__tests__/indirect-call-table_test.ts packages/kernel/src/__tests__/persistence-overlay_test.ts
