name: Deno

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE_RUNTIME_FILES: >-
    packages/kernel/src/image-loader.ts
    packages/kernel/src/image-exporter.ts
    packages/kernel/src/image-builder.ts
    packages/cli/src/cli.ts
    packages/cli/src/image-build-file.ts
    packages/kernel/src/vfs/tar-image-root-provider.ts
    packages/kernel/src/__tests__/image-loader_test.ts
    packages/kernel/src/__tests__/image-exporter_test.ts
    packages/kernel/src/__tests__/image-builder_test.ts
    packages/kernel/src/__tests__/sandbox-image_test.ts
    packages/cli/src/__tests__/cli-image_test.ts
    packages/cli/src/__tests__/cli-image-build_test.ts
    packages/cli/src/__tests__/image-build-file_test.ts
    packages/kernel/src/vfs/__tests__/tar-image-root-provider_test.ts
  IMAGE_RUNTIME_TESTS: >-
    packages/kernel/src/__tests__/image-loader_test.ts
    packages/kernel/src/__tests__/image-exporter_test.ts
    packages/kernel/src/__tests__/image-builder_test.ts
    packages/kernel/src/__tests__/sandbox-image_test.ts
    packages/cli/src/__tests__/cli-image_test.ts
    packages/cli/src/__tests__/cli-image-build_test.ts
    packages/cli/src/__tests__/image-build-file_test.ts
    packages/kernel/src/vfs/__tests__/tar-image-root-provider_test.ts

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check $IMAGE_RUNTIME_FILES

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno lint --rules-exclude=no-import-prefix,no-sloppy-imports,require-await $IMAGE_RUNTIME_FILES

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check $IMAGE_RUNTIME_FILES

  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --no-check --allow-read --allow-write --allow-env --allow-net --allow-run $IMAGE_RUNTIME_TESTS

  # NOTE: a `hooks-self-check` job that runs `pre-commit run --all-files`
  # belongs in this file but is intentionally omitted from the initial gates
  # PR. It would fail on day one against the existing format/lint debt on
  # main. The follow-up PR that clears that debt should land this job in the
  # same change.
